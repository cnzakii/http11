name: Bug report
description: Report reproducible incorrect behavior in h11r
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe what happened, what you expected, and—when possible—the smallest code or HTTP bytes that reproduce it. Include the complete error output.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Which h11r version or commit are you using, if known?
      placeholder: e.g. 0.1.1 or d1f97e3
    validations:
      required: false
