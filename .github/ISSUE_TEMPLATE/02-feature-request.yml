name: Feature request
description: Suggest an improvement within h11r's HTTP/1.1 Sans-I/O scope
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem and the behavior you would like to see.
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Example
      description: Show how the feature would be used, if an example helps explain it.
    validations:
      required: false
