name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUFF_OUTPUT_FORMAT: github
  TY_OUTPUT_FORMAT: github

jobs:
  changes:
    name: Classify changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.paths.outputs.code }}
      docs: ${{ steps.paths.outputs.docs }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Classify affected checks
        id: paths
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          sh .github/scripts/classify-changes.sh --self-test
          if [[ "$GITHUB_EVENT_NAME" = pull_request ]]; then
            range="$BASE_SHA...$GITHUB_SHA"
          else
            range="$BASE_SHA..$GITHUB_SHA"
          fi
          git diff --name-only "$range" |
            sh .github/scripts/classify-changes.sh >> "$GITHUB_OUTPUT"

  lint:
    name: Lint and static analysis
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v9.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: uv sync --locked
      - run: make lint

  rust:
    name: Rust stable
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - run: make test-rust

  msrv:
    name: Rust 1.88 (MSRV)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.88
      - run: make test-rust

  python:
    name: Python ${{ matrix.python-version }}${{ matrix.preview && ' preview' || '' }} on ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14", "3.14t"]
        include:
          # Prerelease interpreters provide forward-compatibility coverage;
          # they are not part of the supported release matrix yet.
          - os: ubuntu-latest
            python-version: "3.15"
            preview: true
          - os: ubuntu-latest
            python-version: "3.15t"
            preview: true
          # One interpreter per additional platform exercises the native
          # extension without multiplying the full version matrix.
          - os: ubuntu-24.04-arm
            python-version: "3.12"
          - os: macos-15-intel
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
          - os: windows-11-arm
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - run: uv sync --locked
      - run: uv --directory crates/h11r-python run --locked maturin develop --release
      - run: uv run --locked pytest

  coverage:
    name: Coverage
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    # OIDC authenticates Codecov without a stored upload secret. Codecov's
    # GitHub App must be connected before the first upload.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v9.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.7
      - run: uv sync --locked
      - name: Generate Rust and Python coverage reports
        run: make coverage
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          disable_search: true
          # Coverage generation fails in the preceding step. Only an external
          # upload failure remains advisory.
          fail_ci_if_error: false
          files: rust.lcov,coverage.xml
          use_oidc: true

  documentation:
    name: Build documentation
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v9.0.0
      - uses: dtolnay/rust-toolchain@stable
      - run: uv sync --locked
      - run: make docs

  publish-documentation:
    name: Publish development documentation
    needs: changes
    if: github.event_name == 'push' && needs.changes.outputs.docs == 'true'
    permissions:
      contents: write
      pages: write
      id-token: write
    uses: ./.github/workflows/publish-docs.yml

  required:
    name: Required checks
    if: always()
    needs:
      - changes
      - lint
      - rust
      - msrv
      - python
      - coverage
      - documentation
      - publish-documentation
    runs-on: ubuntu-latest
    steps:
      - name: Require successful affected checks
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          for result in $RESULTS; do
            case "$result" in
              success|skipped) ;;
              *) exit 1 ;;
            esac
          done
