name: Release

on:
  pull_request:
    paths:
      - ".github/workflows/release.yml"
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    outputs:
      maturin-version: ${{ steps.maturin.outputs.version }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Verify tag and package version
        if: github.event_name == 'push'
        id: version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          version="$(awk -F '"' '/^version = "/ { print $2; exit }' Cargo.toml)"
          test -n "$version"
          test "$RELEASE_TAG" = "v$version"
          grep -Fq "## [$version] - " CHANGELOG.md
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - run: uv sync --locked
      - name: Read locked maturin version
        id: maturin
        run: |
          version="$(uv run --locked maturin --version)"
          version="${version#maturin }"
          test -n "$version"
          echo "version=v$version" >> "$GITHUB_OUTPUT"
      - run: make check
      - run: cargo publish --dry-run -p h11r --locked

  wheels:
    name: Wheel (${{ matrix.platform }}, ${{ matrix.abi-profile }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - manylinux-x86_64
          - manylinux-aarch64
          - macos-x86_64
          - macos-aarch64
          - windows-x86_64
          - windows-aarch64
        abi-profile: [abi3, cp314t]
        include:
          - platform: manylinux-x86_64
            os: ubuntu-22.04
            target: x86_64
            manylinux: "2014"
          - platform: manylinux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64
            manylinux: "2014"
          - platform: macos-x86_64
            os: macos-15-intel
            target: x86_64
            manylinux: auto
          - platform: macos-aarch64
            os: macos-latest
            target: aarch64
            manylinux: auto
          - platform: windows-x86_64
            os: windows-latest
            target: x64
            manylinux: auto
          - platform: windows-aarch64
            os: windows-11-arm
            target: aarch64
            manylinux: auto
          - abi-profile: abi3
            python-version: "3.12"
            manylinux-interpreter: /opt/python/cp312-cp312/bin/python
            wheel-tag: cp311-abi3
          - abi-profile: cp314t
            python-version: "3.14t"
            manylinux-interpreter: /opt/python/cp314-cp314t/bin/python
            wheel-tag: cp314-cp314t
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v7
        id: build-python
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: ${{ needs.validate.outputs.maturin-version }}
          working-directory: crates/h11r-python
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: >-
            --release --locked --compatibility pypi
            --interpreter ${{ startsWith(matrix.platform, 'manylinux-') && matrix.manylinux-interpreter || steps.build-python.outputs.python-path }}
            --out dist
      - name: Validate wheel tag
        id: wheel
        shell: bash
        working-directory: crates/h11r-python
        run: |
          set -- dist/*.whl
          test "$#" -eq 1
          wheel="$1"
          test -f "$wheel"
          case "$(basename "$wheel")" in
            *-${{ matrix.wheel-tag }}-*.whl) ;;
            *) echo "unexpected wheel tag: $wheel" >&2; exit 1 ;;
          esac
          echo "path=$wheel" >> "$GITHUB_OUTPUT"
      - name: Smoke-test native wheel
        shell: bash
        working-directory: crates/h11r-python
        run: |
          "${{ steps.build-python.outputs.python-path }}" -m pip install "${{ steps.wheel.outputs.path }}"
          "${{ steps.build-python.outputs.python-path }}" -c "import h11r"
      - name: Verify free-threaded import leaves the GIL disabled
        if: matrix.abi-profile != 'abi3'
        shell: bash
        run: |
          "${{ steps.build-python.outputs.python-path }}" -c "import h11r, sys, sysconfig; assert sysconfig.get_config_var('Py_GIL_DISABLED'); assert not sys._is_gil_enabled()"
      - uses: actions/upload-artifact@v7
        with:
          name: python-${{ matrix.platform }}-${{ matrix.abi-profile }}
          path: crates/h11r-python/dist/*.whl
          if-no-files-found: error

  sdist:
    name: Source distribution
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build source distribution
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          maturin-version: ${{ needs.validate.outputs.maturin-version }}
          working-directory: crates/h11r-python
          args: --out dist
      - name: Smoke-test source distribution
        run: |
          python -m pip install crates/h11r-python/dist/*.tar.gz
          python -c "import h11r"
      - uses: actions/upload-artifact@v7
        with:
          name: python-sdist
          path: crates/h11r-python/dist/*.tar.gz
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'push'
    needs: [validate, wheels, sdist]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: python-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-crate:
    name: Publish to crates.io
    if: github.event_name == 'push'
    needs: [validate, wheels, sdist]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Check whether the crate version already exists
        id: crate
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          status="$(curl --silent \
            --user-agent "h11r-release (+https://github.com/$GITHUB_REPOSITORY)" \
            --output /dev/null --write-out '%{http_code}' \
            "https://crates.io/api/v1/crates/h11r/$VERSION")"
          case "$status" in
            200) exists=true ;;
            404) exists=false ;;
            *) echo "crates.io returned HTTP $status" >&2; exit 1 ;;
          esac
          echo "exists=$exists" >> "$GITHUB_OUTPUT"
      - name: Authenticate with crates.io
        if: steps.crate.outputs.exists == 'false'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - name: Publish crate
        if: steps.crate.outputs.exists == 'false'
        run: cargo publish -p h11r --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  github-release:
    name: Publish GitHub release
    if: github.event_name == 'push'
    needs: [publish-pypi, publish-crate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes

  publish-docs:
    name: Publish documentation
    if: github.event_name == 'push'
    needs: [validate, github-release]
    permissions:
      contents: write
      pages: write
      id-token: write
    uses: ./.github/workflows/publish-docs.yml
