     <path d="M97 114 C95 134 98 154 97 166" stroke="#FBE7C6" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/>

     <!-- byte dot (Python blue) -->
     <circle cx="131" cy="168" r="12" fill="#2C5480"/>
     <circle cx="131" cy="168" r="9" fill="#3B6EA5"/>

     <!-- right "1" (head end) -->
