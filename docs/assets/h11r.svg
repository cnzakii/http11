     <circle cx="157" cy="78" r="4.4" fill="#241A16"/>
     <circle cx="177" cy="78" r="4.4" fill="#241A16"/>
     <circle cx="158.5" cy="75.5" r="1.8" fill="#FFFFFF"/>
